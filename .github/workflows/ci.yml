name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: pnpm/action-setup@v6.0.9

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      # NOTE: pnpm test mocks all model calls. No provider keys needed here,
      # so this job runs safely on forked-PR contributions.

  meta-evals:
    name: meta-evals (the prover)
    # Deterministic fake-provider meta-evals. Live-model evals stay in pnpm eval:live.
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm eval

  # Optional but recommended: secret scanning to enforce "no secrets, ever".
  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
      - name: Run gitleaks
        run: /tmp/gitleaks detect --redact -v --exit-code=2 --log-opts=-1
